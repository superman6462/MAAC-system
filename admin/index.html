<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAC | Admin Panel</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <link rel="stylesheet" href="/assets/css/glassmorphism.css">
  <!-- Firebase SDKs -->
  <script src="/__/firebase/9.22.2/firebase-app-compat.js"></script>
  <script src="/__/firebase/9.22.2/firebase-auth-compat.js"></script>
  <script src="/__/firebase/9.22.2/firebase-firestore-compat.js"></script>
  <script src="/__/firebase/9.22.2/firebase-storage-compat.js"></script>
  <script src="/firebase/firebase-config.js"></script>
  <!-- Shared Modules -->
  <script src="/shared/auth.js"></script>
  <script src="/shared/db.js"></script>
  <script src="/shared/notifications.js"></script>
  <script src="/offline/idb.js"></script>
  <script src="/offline/offline-queue.js"></script>
  <!-- Feature Modules -->
  <script src="/attendance/attendance-core.js"></script>
  <script src="/attendance/attendance-ui.js"></script>
  <script src="/attendance/attendance-qr.js"></script>
  <script src="/finance/finance-core.js"></script>
  <script src="/finance/finance-ui.js"></script>
  <script src="/homework/homework-core.js"></script>
  <script src="/homework/homework-ui.js"></script>
  <script src="/leaderboard/leaderboard-core.js"></script>
  <script src="/leaderboard/leaderboard-ui.js"></script>
  <script src="/results/results-ocr.js"></script>
  <!-- Chart.js for analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <div class="glass dashboard-container">
    <h1>⚙️ অ্যাডমিন প্যানেল / Admin Panel</h1>
    <div class="admin-grid">
      <nav class="sidebar glass">
        <button onclick="loadModule('attendance')">📋 উপস্থিতি</button>
        <button onclick="loadModule('qr')">📷 QR স্ক্যান</button>
        <button onclick="loadModule('notices')">📢 নোটিশ</button>
        <button onclick="loadModule('homework')">📝 হোমওয়ার্ক</button>
        <button onclick="loadModule('marks')">📊 মার্কস</button>
        <button onclick="loadModule('routine')">🕒 রুটিন</button>
        <button onclick="loadModule('results')">📑 রেজাল্ট</button>
        <button onclick="loadModule('admission')">📝 ভর্তি</button>
        <button onclick="loadModule('finance')">💰 ফাইন্যান্স</button>
        <button onclick="loadModule('students')">👥 ছাত্র</button>
        <button onclick="loadModule('teachers')">👨‍🏫 শিক্ষক</button>
        <button onclick="loadModule('leaderboard')">🏆 লিডারবোর্ড</button>
        <button onclick="loadModule('analytics')">📈 অ্যানালিটিক্স</button>
        <button onclick="loadModule('settings')">⚙️ সেটিংস</button>
      </nav>
      <main id="adminContent" class="content-area glass">
        <p>একটি মডিউল নির্বাচন করুন।</p>
      </main>
    </div>
    <button onclick="logout()" style="margin-top:20px;">লগআউট</button>
  </div>
  <script src="/admin/admin.js"></script>
</body>
</html>
