<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAC | Super Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1A73E8, #00BFA5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(255,255,255,0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    .login-box h2 { margin-bottom: 10px; color: #1A73E8; }
    .login-box p { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
    input {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border 0.3s;
    }
    input:focus { border-color: #1A73E8; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1A73E8, #00BFA5);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:active { opacity: 0.8; }
    #msg { margin-top: 16px; font-size: 0.9rem; }
    #msg.error { color: #e53935; }
    #msg.success { color: #2e7d32; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 MAAC Super Admin</h2>
    <p>Sign in to manage the system</p>
    <input id="email" type="email" placeholder="Email address">
    <input id="password" type="password" placeholder="Password">
    <button onclick="handleLogin()">Sign In</button>
    <div id="msg"></div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCwRPJ7Rh-0yA_ZNSfsMv2JIFqQVL_YDqI",
      authDomain: "maac-system.firebaseapp.com",
      projectId: "maac-system",
      storageBucket: "maac-system.firebasestorage.app",
      messagingSenderId: "888172288312",
      appId: "1:888172288312:web:29e2e182e2dbd55df209cd"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');

      if (!email || !password) {
        msg.textContent = 'Please enter email and password';
        msg.className = 'error';
        return;
      }

      msg.textContent = 'Signing in...';
      msg.className = '';

      try {
        await auth.signInWithEmailAndPassword(email, password);
        msg.textContent = '✅ Login successful! Redirecting...';
        msg.className = 'success';
        // ✅ REDIRECT TO STANDALONE SUPER ADMIN PANEL
        setTimeout(() => {
          window.location.href = '/secure-admin/super-admin.html';
        }, 1000);
      } catch (error) {
        msg.textContent = '❌ ' + error.message;
        msg.className = 'error';
      }
    }

    // Allow pressing Enter to login
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
