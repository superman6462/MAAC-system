<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAC | Login</title>
  <script src="/__/firebase/9.22.2/firebase-app-compat.js"></script>
  <script src="/__/firebase/9.22.2/firebase-auth-compat.js"></script>
  <script src="/firebase/firebase-config.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center; padding:40px;">
  <h2>Super Admin Login</h2>
  <input id="email" type="email" placeholder="Email" style="display:block; margin:10px auto; padding:12px; width:80%; font-size:16px;"><br>
  <input id="password" type="password" placeholder="Password" style="display:block; margin:10px auto; padding:12px; width:80%; font-size:16px;"><br>
  <button onclick="login()" style="padding:12px 30px; font-size:16px;">Login</button>
  <p id="msg" style="margin-top:20px; color:red;"></p>
  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      try {
        await firebase.auth().signInWithEmailAndPassword(email, pass);
        window.location.href = '/secure-admin/';
      } catch(e) {
        document.getElementById('msg').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
