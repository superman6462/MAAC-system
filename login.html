<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAC | Super Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #1A73E8, #00BFA5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 380px;
      text-align: center;
    }
    h2 { color: #1A73E8; margin-bottom: 20px; }
    input {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #1A73E8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }
    #status { margin-top: 14px; font-size: 14px; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 MAAC Super Admin</h2>
    <input id="email" type="email" placeholder="Email address">
    <input id="password" type="password" placeholder="Password">
    <button onclick="doLogin()">Sign In</button>
    <div id="status"></div>
  </div>

  <!-- Firebase via official CDN (version 10.12.2 compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    // Wait for scripts to load
    window.onload = function() {
      document.getElementById('status').textContent = 'Ready. Enter credentials.';
      document.getElementById('status').className = 'success';
    };

    function doLogin() {
      const status = document.getElementById('status');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        status.textContent = 'Enter email and password.';
        status.className = 'error';
        return;
      }

      // Check if firebase loaded
      if (typeof firebase === 'undefined') {
        status.textContent = 'Firebase still loading... wait 3 seconds and try again.';
        status.className = 'error';
        return;
      }

      // Init if not already
      if (!firebase.apps.length) {
        firebase.initializeApp({
          apiKey: "AIzaSyCwRPJ7Rh-0yA_ZNSfsMv2JIFqQVL_YDqI",
          authDomain: "maac-system.firebaseapp.com",
          projectId: "maac-system",
          storageBucket: "maac-system.firebasestorage.app",
          messagingSenderId: "888172288312",
          appId: "1:888172288312:web:29e2e182e2dbd55df209cd"
        });
      }

      status.textContent = 'Signing in...';
      status.className = '';

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(() => {
          status.textContent = '✅ Success! Redirecting...';
          status.className = 'success';
          setTimeout(() => { window.location.href = '/secure-admin/super-admin.html'; }, 800);
        })
        .catch(err => {
          status.textContent = '❌ ' + err.message;
          status.className = 'error';
        });
    }
  </script>
</body>
</html>
