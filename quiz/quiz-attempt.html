<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1628">
<title>MAAC | Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --navy:#0a1628; --navy2:#112040;
  --gold:#c9a84c; --gold2:#e8c96a;
  --success:#22c55e; --danger:#ef4444; --warning:#f59e0b;
  --text:#1a2540; --muted:#6b7a99;
  --border:rgba(10,22,40,.10); --card-bg:#fff;
  --bg:#f7f5f0;
  --shadow:0 4px 24px rgba(10,22,40,.08);
  --shadow-lg:0 12px 48px rgba(10,22,40,.14);
  --radius:14px; --radius-sm:8px;
  --transition:.25s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Noto Sans Bengali',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3{font-family:'DM Serif Display',serif;line-height:1.2}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:1rem;font-weight:700}
.logo-txt{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--navy)}
.logo-txt span{color:var(--gold)}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
.quiz-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1a3060 100%);border-radius:var(--radius);padding:26px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.quiz-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 30%,rgba(201,168,76,.2) 0%,transparent 55%)}
.quiz-hero h2{font-size:1.5rem;position:relative}
.quiz-hero p{color:rgba(255,255,255,.65);font-size:.85rem;margin-top:6px;position:relative}
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative}
.meta-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:5px 12px;font-size:.72rem;font-weight:600}
label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;font-family:inherit}
.form-input:focus{outline:none;border-color:var(--gold)}
.field{margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:var(--radius-sm);border:none;font-weight:600;font-size:.9rem;cursor:pointer;transition:all var(--transition);width:100%}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.q-card{margin-bottom:14px}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--navy);color:var(--gold);font-size:.75rem;font-weight:700;margin-right:8px}
.q-text{font-size:.95rem;font-weight:600;margin-bottom:12px;display:inline}
.q-img{max-width:100%;border-radius:var(--radius-sm);margin:10px 0;border:1px solid var(--border)}
.opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all var(--transition);font-size:.87rem}
.opt:hover{border-color:var(--gold)}
.opt.selected{border-color:var(--gold);background:rgba(201,168,76,.1);font-weight:600}
.opt input{accent-color:var(--gold)}
.opt-letter{width:24px;height:24px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--muted);flex-shrink:0}
.opt.selected .opt-letter{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.progress-bar{height:6px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .3s ease}
.result-score{font-family:'DM Serif Display',serif;font-size:3rem;color:var(--gold);text-align:center;margin:14px 0 4px}
.result-sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:18px}
.state-msg{text-align:center;padding:40px 20px;color:var(--muted)}
.state-msg i{font-size:2.2rem;color:var(--gold);margin-bottom:12px;display:block}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div class="logo-mark"><i class="fas fa-graduation-cap"></i></div>
    <div class="logo-txt">MAAC <span>Quiz</span></div>
  </div>

  <div id="app">
    <div class="state-msg"><i class="fas fa-spinner fa-spin"></i>Loading quiz…</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="quiz-core.js"></script>
<script>
const FC = {
  apiKey:"AIzaSyCwRPJ7Rh-0yA_ZNSfsMv2JIFqQVL_YDqI",
  authDomain:"maac-system.firebaseapp.com",
  projectId:"maac-system",
  storageBucket:"maac-system.firebasestorage.app",
  messagingSenderId:"888172288312",
  appId:"1:888172288312:web:29e2e182e2dbd55df209cd"
};
if (!firebase.apps.length) firebase.initializeApp(FC);
const db = firebase.firestore();

const app = document.getElementById('app');
const params = new URLSearchParams(location.search);
const quizId = params.get('quiz');

let quiz = null;
let selectedAnswers = [];
let studentId = '', studentName = '';

async function init() {
  if (!quizId) {
    app.innerHTML = `<div class="state-msg"><i class="fas fa-triangle-exclamation"></i>No quiz specified. Please use the link shared by your teacher.</div>`;
    return;
  }
  try {
    quiz = await getQuiz(quizId);
  } catch (e) {
    app.innerHTML = `<div class="state-msg"><i class="fas fa-triangle-exclamation"></i>Error loading quiz: ${e.message}</div>`;
    return;
  }
  if (!quiz) {
    app.innerHTML = `<div class="state-msg"><i class="fas fa-circle-question"></i>Quiz not found.</div>`;
    return;
  }
  if (quiz.status !== 'active') {
    app.innerHTML = `<div class="state-msg"><i class="fas fa-lock"></i>This quiz is currently closed.</div>`;
    return;
  }
  if (!quiz.questions || quiz.questions.length === 0) {
    app.innerHTML = `<div class="state-msg"><i class="fas fa-circle-question"></i>This quiz has no questions yet.</div>`;
    return;
  }
  renderIdentifyForm();
}

function renderIdentifyForm() {
  app.innerHTML = `
    <div class="quiz-hero">
      <h2>${quiz.title}</h2>
      <p>${quiz.description || 'Answer all questions and submit before time runs out.'}</p>
      <div class="meta-row">
        <span class="meta-chip"><i class="fas fa-book"></i> ${quiz.subject || 'General'}</span>
        <span class="meta-chip"><i class="fas fa-clock"></i> ${quiz.duration || 30} min</span>
        <span class="meta-chip"><i class="fas fa-list-check"></i> ${quiz.questions.length} questions</span>
        <span class="meta-chip"><i class="fas fa-graduation-cap"></i> ${quiz.class || 'All Classes'}</span>
      </div>
    </div>
    <div class="card">
      <h3 style="font-size:1.1rem;margin-bottom:14px">Enter your details to start</h3>
      <div class="field">
        <label>Student ID</label>
        <input class="form-input" id="in-id" placeholder="e.g. MAAC-2031">
      </div>
      <div class="field">
        <label>Full Name</label>
        <input class="form-input" id="in-name" placeholder="Your full name">
      </div>
      <button class="btn btn-primary" id="startBtn"><i class="fas fa-play"></i> Start Quiz</button>
      <p id="startErr" style="color:var(--danger);font-size:.8rem;margin-top:10px;display:none"></p>
    </div>`;

  const prefId = params.get('sid');
  const prefName = params.get('sname');
  if (prefId) document.getElementById('in-id').value = prefId;
  if (prefName) document.getElementById('in-name').value = prefName;

  document.getElementById('startBtn').addEventListener('click', async () => {
    const id = document.getElementById('in-id').value.trim();
    const name = document.getElementById('in-name').value.trim();
    const errEl = document.getElementById('startErr');
    if (!id || !name) {
      errEl.textContent = 'Please enter both your Student ID and name.';
      errEl.style.display = 'block';
      return;
    }
    studentId = id; studentName = name;

    const startBtn = document.getElementById('startBtn');
    startBtn.disabled = true;
    startBtn.innerHTML = '<span class="spinner"></span> Checking…';

    try {
      const prior = await hasAttempted(quizId, studentId);
      if (prior) {
        renderResult(prior);
        return;
      }
    } catch (e) { /* proceed anyway */ }

    selectedAnswers = new Array(quiz.questions.length).fill(null);
    renderQuiz();
  });
}

function renderQuiz() {
  const answeredCount = selectedAnswers.filter(a => a !== null).length;
  const pct = Math.round((answeredCount / quiz.questions.length) * 100);

  let qHtml = '';
  quiz.questions.forEach((q, qi) => {
    let optsHtml = '';
    q.options.forEach((opt, oi) => {
      const letter = String.fromCharCode(65 + oi);
      const isSel = selectedAnswers[qi] === oi;
      optsHtml += `
        <label class="opt ${isSel ? 'selected' : ''}" data-qi="${qi}" data-oi="${oi}">
          <span class="opt-letter">${letter}</span>
          <input type="radio" name="q${qi}" style="display:none">
          <span>${opt}</span>
        </label>`;
    });
    qHtml += `
      <div class="card q-card">
        <p><span class="q-num">${qi + 1}</span><span class="q-text">${q.text}</span></p>
        ${q.image ? `<img class="q-img" src="${q.image}" alt="Question image">` : ''}
        <div style="margin-top:10px">${optsHtml}</div>
      </div>`;
  });

  app.innerHTML = `
    <div class="card" style="padding:16px 22px">
      <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:8px">
        <span>${answeredCount} of ${quiz.questions.length} answered</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${qHtml}
    <button class="btn btn-primary" id="submitBtn"><i class="fas fa-paper-plane"></i> Submit Quiz</button>
    <p id="submitErr" style="color:var(--danger);font-size:.8rem;margin-top:10px;text-align:center;display:none"></p>`;

  document.querySelectorAll('.opt').forEach(opt => {
    opt.addEventListener('click', () => {
      const qi = parseInt(opt.dataset.qi);
      const oi = parseInt(opt.dataset.oi);
      selectedAnswers[qi] = oi;
      renderQuiz();
      window.scrollTo({ top: document.querySelector(`.q-card:nth-child(${qi + 2})`)?.offsetTop - 20 || 0, behavior: 'instant' });
    });
  });

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const errEl = document.getElementById('submitErr');
    if (selectedAnswers.some(a => a === null)) {
      errEl.textContent = 'Please answer all questions before submitting.';
      errEl.style.display = 'block';
      return;
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Submitting…';
    try {
      const result = await submitQuizAnswer(quizId, studentId, studentName, selectedAnswers);
      renderResult(result);
    } catch (e) {
      errEl.textContent = 'Error submitting: ' + e.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Quiz';
    }
  });
}

function renderResult(result) {
  const pct = Math.round((result.score / result.total) * 100);
  app.innerHTML = `
    <div class="card" style="text-align:center">
      <i class="fas fa-circle-check" style="font-size:2.2rem;color:var(--success)"></i>
      <h2 style="margin-top:10px">Quiz Submitted</h2>
      <div class="result-score">${result.score}/${result.total}</div>
      <div class="result-sub">${pct}% correct • ${studentName || result.studentName || ''}</div>
    </div>`;
}

init();
</script>
</body>
</html>
