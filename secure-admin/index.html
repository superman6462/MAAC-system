<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAC | Super Admin</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <link rel="stylesheet" href="/assets/css/glassmorphism.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="glass dashboard-container">
    <h1>🔧 সুপার অ্যাডমিন প্যানেল</h1>
    <p id="loadingMsg">লোড হচ্ছে... / Loading...</p>
    <div id="superContent" style="display:none;">
      <p>Logged in as: <b id="userEmail"></b></p>
      <div class="admin-grid">
        <nav class="sidebar glass" id="superSidebar">
          <button data-module="dashboard">📊 ড্যাশবোর্ড</button>
          <button data-module="website">🌐 ওয়েবসাইট</button>
          <button data-module="users">👥 ইউজার</button>
          <button data-module="academic">📚 একাডেমিক</button>
          <button data-module="finance">💰 ফাইন্যান্স</button>
          <button data-module="settings">⚙️ সেটিংস</button>
          <button data-module="system">🛠️ সিস্টেম</button>
        </nav>
        <main id="dynamicContent" class="content-area glass">
          <p>একটি মডিউল নির্বাচন করুন।</p>
        </main>
      </div>
    </div>
    <button onclick="logout()" style="margin:20px;">লগআউট</button>
  </div>
  <script src="/secure-admin/super-admin.js"></script>
</body>
</html>
