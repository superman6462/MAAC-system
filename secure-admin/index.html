<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAC | Super Admin</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <link rel="stylesheet" href="/assets/css/glassmorphism.css">
  <!-- Firebase SDKs -->
  <script src="/__/firebase/9.22.2/firebase-app-compat.js"></script>
  <script src="/__/firebase/9.22.2/firebase-auth-compat.js"></script>
  <script src="/__/firebase/9.22.2/firebase-firestore-compat.js"></script>
  <script src="/__/firebase/9.22.2/firebase-storage-compat.js"></script>
  <script src="/firebase/firebase-config.js"></script>
  <!-- Shared Modules -->
  <script src="/shared/auth.js"></script>
  <script src="/shared/db.js"></script>
  <script src="/shared/notifications.js"></script>
  <script src="/offline/idb.js"></script>
  <script src="/offline/offline-queue.js"></script>
  <!-- Feature Modules (reuse existing) -->
  <script src="/attendance/attendance-core.js"></script>
  <script src="/attendance/attendance-ui.js"></script>
  <script src="/attendance/attendance-qr.js"></script>
  <script src="/finance/finance-core.js"></script>
  <script src="/finance/finance-ui.js"></script>
  <script src="/homework/homework-core.js"></script>
  <script src="/homework/homework-ui.js"></script>
  <script src="/leaderboard/leaderboard-core.js"></script>
  <script src="/leaderboard/leaderboard-ui.js"></script>
  <script src="/results/results-core.js"></script>
  <script src="/results/results-ocr.js"></script>
  <script src="/analytics/analytics-core.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- Tesseract (OCR) -->
  <script src="https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js"></script>
</head>
<body>
  <div class="glass dashboard-container">
    <h1>🔧 সুপার অ্যাডমিন প্যানেল</h1>
    <div class="admin-grid">
      <nav class="sidebar glass" id="superSidebar">
        <button data-module="dashboard">📊 ড্যাশবোর্ড</button>
        <button data-module="website">🌐 ওয়েবসাইট</button>
        <button data-module="users">👥 ইউজার</button>
        <button data-module="academic">📚 একাডেমিক</button>
        <button data-module="finance">💰 ফাইন্যান্স</button>
        <button data-module="settings">⚙️ সেটিংস</button>
        <button data-module="system">🛠️ সিস্টেম</button>
      </nav>
      <main id="superContent" class="content-area glass">
        <p>একটি মডিউল নির্বাচন করুন।</p>
      </main>
    </div>
    <button onclick="logout()">লগআউট</button>
  </div>
  <script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }
  </script>
  <script src="/secure-admin/super-admin.js"></script>
</body>
</html>
