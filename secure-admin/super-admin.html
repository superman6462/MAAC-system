<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAC | Super Admin</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* ============================================================
       TOKENS
    ============================================================ */
    :root {
      --navy:       #0a1628;
      --navy2:      #112040;
      --navy3:      #172a4e;
      --gold:       #c9a84c;
      --gold2:      #e8c96a;
      --teal:       #1ecbe1;
      --green:      #22c55e;
      --red:        #ef4444;
      --amber:      #f59e0b;
      --purple:     #8b5cf6;
      --sidebar-w:  260px;
      --header-h:   64px;
      --radius:     14px;
      --radius-sm:  8px;
      --border:     rgba(255,255,255,0.08);
      --text:       #e2e8f6;
      --muted:      #7a90b8;
      --card:       #152036;
      --card2:      #1a2948;
      --input-bg:   #0f1c30;
      --shadow:     0 4px 24px rgba(0,0,0,0.35);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.5);
      --transition: 0.25s cubic-bezier(.4,0,.2,1);
    }

    /* ============================================================
       BASE
    ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    h1, h2, h3, h4 { font-family: 'DM Serif Display', serif; line-height: 1.2; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--navy2); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

    /* ============================================================
       LOADING SCREEN
    ============================================================ */
    #loadingScreen {
      position: fixed; inset: 0;
      background: var(--navy);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      gap: 20px;
    }
    .loader-logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--navy2), var(--navy3));
      border: 2px solid rgba(201,168,76,0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem; color: var(--gold);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
      50% { box-shadow: 0 0 0 16px rgba(201,168,76,0); }
    }
    .loader-bar {
      width: 240px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; width: 40%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      border-radius: 3px;
      animation: loadAnim 1.5s infinite;
    }
    @keyframes loadAnim {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(360%); }
    }
    #loadStatus { font-size: 0.85rem; color: var(--muted); }
    .loader-error { color: var(--red); text-align: center; font-size: 0.9rem; }
    .loader-error a { color: var(--gold); }

    /* ============================================================
       MAIN LAYOUT
    ============================================================ */
    #mainPanel { display: none; }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ============================================================
       SIDEBAR
    ============================================================ */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--navy2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 200;
      transition: transform var(--transition);
    }
    .sidebar-logo {
      padding: 20px 20px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .logo-mark {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      color: var(--navy); font-size: 1rem; font-weight: 700;
    }
    .logo-text { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--text); }
    .logo-text span { font-size: 0.7rem; font-family: 'DM Sans', sans-serif; color: var(--gold); display: block; margin-top: 1px; }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .nav-group-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      padding: 12px 8px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--transition);
      font-size: 0.88rem; font-weight: 500; color: var(--muted);
      margin-bottom: 2px; border: none; background: none;
      width: 100%; text-align: left;
    }
    .nav-item i { width: 18px; text-align: center; font-size: 0.9rem; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .nav-item.active {
      background: rgba(201,168,76,0.12);
      color: var(--gold);
    }
    .nav-item .badge {
      margin-left: auto;
      background: var(--gold); color: var(--navy);
      font-size: 0.65rem; font-weight: 700;
      padding: 2px 7px; border-radius: 100px;
    }

    .sidebar-bottom {
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
    }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--navy); font-weight: 700;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 0.7rem; color: var(--gold); }
    .logout-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.85rem;
      padding: 4px; transition: color var(--transition);
    }
    .logout-btn:hover { color: var(--red); }

    /* Sidebar close (mobile) */
    .sidebar-close {
      display: none; position: absolute; top: 16px; right: 16px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem;
    }

    /* ============================================================
       MAIN AREA
    ============================================================ */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; display: flex; flex-direction: column;
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      height: var(--header-h);
      background: var(--navy2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .menu-toggle {
      display: none; background: none; border: none; cursor: pointer;
      color: var(--text); font-size: 1.1rem; padding: 6px;
    }
    .page-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--text); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .drive-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 100px; border: none; cursor: pointer;
      background: rgba(201,168,76,0.12); color: var(--gold);
      font-size: 0.82rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
      transition: all var(--transition);
    }
    .drive-btn:hover { background: rgba(201,168,76,0.22); }
    .drive-btn.connected { background: rgba(34,197,94,0.12); color: var(--green); cursor: default; }

    /* Content area */
    .content-area {
      flex: 1; padding: 32px 28px;
      overflow-y: auto;
    }

    /* ============================================================
       UI COMPONENTS
    ============================================================ */

    /* Stat cards */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
    }
    .stat-card .icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; margin-bottom: 14px;
    }
    .stat-card .num {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem; line-height: 1;
    }
    .stat-card .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .stat-card .trend {
      font-size: 0.75rem; margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .trend-up { color: var(--green); }
    .trend-down { color: var(--red); }

    /* Card */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-title { font-size: 1rem; font-weight: 600; }

    /* Form controls */
    .form-grid { display: grid; gap: 14px; }
    .form-grid-2 { grid-template-columns: 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--muted);
    }
    .form-input {
      padding: 10px 14px; border-radius: var(--radius-sm);
      background: var(--input-bg); border: 1px solid var(--border);
      color: var(--text); font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
      transition: border var(--transition);
      width: 100%;
    }
    .form-input:focus { outline: none; border-color: var(--gold); }
    textarea.form-input { resize: vertical; min-height: 90px; }
    select.form-input { cursor: pointer; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 100px; border: none;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all var(--transition);
    }
    .btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.35); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); }
    .btn-sm { padding: 6px 14px; font-size: 0.78rem; }
    .btn-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .btn-green:hover { background: rgba(34,197,94,0.25); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      padding: 12px 14px; text-align: left;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.025); }

    /* Badge chips */
    .chip {
      display: inline-block;
      padding: 3px 10px; border-radius: 100px;
      font-size: 0.72rem; font-weight: 600;
    }
    .chip-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .chip-red   { background: rgba(239,68,68,0.15); color: var(--red); }
    .chip-gold  { background: rgba(201,168,76,0.15); color: var(--gold); }
    .chip-blue  { background: rgba(30,203,225,0.12); color: var(--teal); }
    .chip-purple{ background: rgba(139,92,246,0.15); color: var(--purple); }

    /* Tab bar */
    .tab-bar {
      display: flex; gap: 4px; background: var(--input-bg);
      border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1; padding: 8px 12px; border-radius: 6px; border: none;
      background: none; cursor: pointer; font-size: 0.82rem; font-weight: 500;
      color: var(--muted); transition: all var(--transition);
      font-family: 'DM Sans', sans-serif;
    }
    .tab-btn.active { background: var(--card2); color: var(--text); }

    /* Alert / Toast */
    .toast-container {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 12px 18px; border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
      animation: toastIn 0.3s ease;
      max-width: 320px;
    }
    .toast-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
    .toast-error   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
    .toast-info    { background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); }
    @keyframes toastIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    /* Sidebar overlay (mobile) */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 199;
    }
    .sidebar-overlay.visible { display: block; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 1024px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .form-grid-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(calc(-1 * var(--sidebar-w)));
      }
      .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
      .sidebar-close { display: block; }
      .main { margin-left: 0; }
      .menu-toggle { display: flex; }
      .topbar { padding: 0 16px; }
      .content-area { padding: 20px 16px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>

  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- Google Identity Services — handles Drive OAuth automatically -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ============================================================ TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- ============================================================ LOADING -->
<div id="loadingScreen">
  <div class="loader-logo">M</div>
  <div style="text-align:center;">
    <div style="font-family:'DM Serif Display',serif; font-size:1.1rem; margin-bottom:4px;">MAAC Super Admin</div>
    <div id="loadStatus" style="font-size:0.82rem; color:var(--muted);">Checking authentication…</div>
  </div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- ============================================================ MAIN PANEL -->
<div id="mainPanel">
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
      <div class="sidebar-logo">
        <div class="logo-mark">M</div>
        <div class="logo-text">MAAC<span>Super Admin</span></div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group-label">Overview</div>
        <button class="nav-item active" data-tab="dashboard">
          <i class="fas fa-chart-pie"></i> Dashboard
        </button>

        <div class="nav-group-label">Website</div>
        <button class="nav-item" data-tab="hero">
          <i class="fas fa-wand-magic-sparkles"></i> Hero & Banner
        </button>
        <button class="nav-item" data-tab="courses">
          <i class="fas fa-book-open"></i> Courses
        </button>
        <button class="nav-item" data-tab="teachers">
          <i class="fas fa-chalkboard-user"></i> Teachers
        </button>
        <button class="nav-item" data-tab="gallery">
          <i class="fas fa-images"></i> Gallery
        </button>
        <button class="nav-item" data-tab="videos">
          <i class="fas fa-video"></i> Videos
        </button>
        <button class="nav-item" data-tab="notices">
          <i class="fas fa-bullhorn"></i> Notices
          <span class="badge" id="noticeBadge">0</span>
        </button>
        <button class="nav-item" data-tab="ticker">
          <i class="fas fa-rotate"></i> Notice Ticker
        </button>

        <div class="nav-group-label">Academic</div>
        <button class="nav-item" data-tab="students">
          <i class="fas fa-user-graduate"></i> Students
        </button>
        <button class="nav-item" data-tab="attendance">
          <i class="fas fa-clipboard-check"></i> Attendance
        </button>
        <button class="nav-item" data-tab="teacherAttendance">
          <i class="fas fa-chalkboard-user"></i> Teacher Attendance
        </button>
        <button class="nav-item" data-tab="leaderboard">
          <i class="fas fa-trophy"></i> Leaderboard
        </button>
        <button class="nav-item" data-tab="exams">
          <i class="fas fa-file-pen"></i> Exams & Results
        </button>
        <button class="nav-item" data-tab="quiz">
          <i class="fas fa-question-circle"></i> Quiz
        </button>
        <button class="nav-item" data-tab="routines">
          <i class="fas fa-calendar-days"></i> Routines
        </button>
        <button class="nav-item" data-tab="lessonPlans">
          <i class="fas fa-book-open-reader"></i> Lesson Plans
        </button>

        <div class="nav-group-label">Finance</div>
        <button class="nav-item" data-tab="finance">
          <i class="fas fa-coins"></i> Fee Collections
        </button>
        <button class="nav-item" data-tab="dueNotifications">
          <i class="fas fa-bell"></i> Due Notifications
        </button>

        <div class="nav-group-label">System</div>
        <button class="nav-item" data-tab="siteSettings">
          <i class="fas fa-gear"></i> Site Settings
        </button>
        <button class="nav-item" data-tab="stats">
          <i class="fas fa-chart-bar"></i> Homepage Stats
        </button>
        <button class="nav-item" data-tab="admins">
          <i class="fas fa-shield-halved"></i> Admins
        </button>
        <button class="nav-item" data-tab="logs">
          <i class="fas fa-terminal"></i> System Logs
        </button>
      </nav>

      <div class="sidebar-bottom">
        <div class="user-chip">
          <div class="user-avatar" id="userInitial">A</div>
          <div class="user-info">
            <div class="user-name" id="userEmail">Loading…</div>
            <div class="user-role">Super Admin</div>
          </div>
          <button class="logout-btn" onclick="logout()" title="Logout"><i class="fas fa-right-from-bracket"></i></button>
        </div>
      </div>
    </aside>

    <!-- Sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- MAIN -->
    <div class="main">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <div class="drive-btn connected" id="driveStatus" style="pointer-events:none; opacity:0.5;">
            <i class="fab fa-google-drive"></i> <span id="driveStatusText">Connecting Drive…</span>
          </div>
        </div>
      </header>

      <!-- Content -->
      <div class="content-area" id="contentArea">
        <!-- Injected by JS -->
      </div>
    </div>

  </div>
</div>

<!-- ============================================================ FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="quiz-core.js"></script>
<script src="super-admin.js"></script>

<!-- Attendance external module support -->
<script>
window.AttendanceModule = window.AttendanceModule || {};
</script>
</body>
</html>
