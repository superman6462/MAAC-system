<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAC | Super Admin</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: linear-gradient(135deg, #1A73E8, #00BFA5); min-height: 100vh; color: #fff; }
    .header { background: rgba(0,0,0,0.3); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .sidebar { background: rgba(255,255,255,0.1); padding: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .sidebar button { padding: 10px 14px; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: #fff; cursor: pointer; font-size: 14px; }
    .sidebar button.active, .sidebar button:hover { background: rgba(255,255,255,0.5); }
    .content { padding: 20px; min-height: 60vh; }
    .card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; margin: 8px 0; }
    .grid { display: flex; flex-wrap: wrap; gap: 12px; }
    input, textarea, select { padding: 10px; border-radius: 8px; border: none; margin: 4px; font-size: 14px; width: 100%; max-width: 400px; }
    button.action { padding: 10px 20px; background: #fff; color: #1A73E8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 4px; }
    #loadingScreen { text-align: center; padding: 80px 20px; }
    #mainPanel { display: none; }
  </style>
  <!-- Google API for OAuth -->
  <script src="https://apis.google.com/js/api.js"></script>
  <!-- html5-qrcode for QR scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

<div id="loadingScreen">
  <h2>⏳ লোড হচ্ছে...</h2>
  <p id="loadStatus">Checking authentication...</p>
</div>

<div id="mainPanel">
  <div class="header">
    <h2>🔧 সুপার অ্যাডমিন</h2>
    <span id="userEmail"></span>
    <button id="driveBtn" onclick="handleDriveAuth()" style="padding:8px 16px; border-radius:8px; border:none; cursor:pointer; background:#fff; color:#1A73E8; font-weight:bold;">🔗 Connect Google Drive</button>
    <button onclick="logout()" style="padding:8px 16px; border-radius:8px; border:none; cursor:pointer;">লগআউট</button>
  </div>
  <div class="sidebar" id="sidebarNav">
    <button data-tab="dashboard" class="active">📊 ড্যাশবোর্ড</button>
    <button data-tab="website">🌐 ওয়েবসাইট</button>
    <button data-tab="users">👥 ইউজার</button>
    <button data-tab="settings">⚙️ সেটিংস</button>
    <button data-tab="system">🛠️ সিস্টেম</button>
    <button data-tab="attendance">📋 Attendance</button>
  </div>
  <div class="content" id="contentArea"></div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // ========== FIREBASE INIT ==========
  firebase.initializeApp({
    apiKey: "AIzaSyCwRPJ7Rh-0yA_ZNSfsMv2JIFqQVL_YDqI",
    authDomain: "maac-system.firebaseapp.com",
    projectId: "maac-system",
    storageBucket: "maac-system.firebasestorage.app",
    messagingSenderId: "888172288312",
    appId: "1:888172288312:web:29e2e182e2dbd55df209cd"
  });
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ========== GOOGLE DRIVE SETUP ==========
  const GOOGLE_CLIENT_ID = '888172288312-tce288fthu55003cofgdgnlj1426ddch.apps.googleusercontent.com';
  const DRIVE_FOLDER_ID = '17TkAb01lkQLseNzVpWkpUm-L-ZZkgRe-';
  let accessToken = null;

  function initGoogleAPI() {
    gapi.load('client:auth2', () => {
      gapi.auth2.init({ client_id: GOOGLE_CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file' }).then(() => {
        const authInstance = gapi.auth2.getAuthInstance();
        if (authInstance.isSignedIn.get()) {
          accessToken = authInstance.currentUser.get().getAuthResponse().access_token;
          document.getElementById('driveBtn').textContent = '✅ Drive Connected';
          document.getElementById('driveBtn').disabled = true;
        } else {
          document.getElementById('driveBtn').disabled = false;  // enable the button
        }
      });
    });
  }

  function handleDriveAuth() {
    const authInstance = gapi.auth2.getAuthInstance();
    if (!authInstance) {
      alert('Google API not ready yet. Please wait a few seconds and try again.');
      return;
    }
    authInstance.signIn().then(user => {
      accessToken = user.getAuthResponse().access_token;
      document.getElementById('driveBtn').textContent = '✅ Drive Connected';
      document.getElementById('driveBtn').disabled = true;
      alert('Google Drive connected!');
    }).catch(e => {
      console.error('Drive sign-in error:', e);
      let msg = 'Drive auth failed';
      if (e.error) msg += ': ' + e.error;
      else if (e.message) msg += ': ' + e.message;
      else msg += ': ' + JSON.stringify(e).slice(0, 100);
      alert(msg);
    });
  }

  async function uploadToDrive(file) {
    if (!accessToken) throw new Error('Google Drive not connected. Click "Connect Google Drive" first.');
    const metadata = { name: file.name, parents: [DRIVE_FOLDER_ID] };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', file);
    const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: new Headers({ 'Authorization': 'Bearer ' + accessToken }),
      body: form
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error.message);
    await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions`, {
      method: 'POST',
      headers: new Headers({ 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }),
      body: JSON.stringify({ role: 'reader', type: 'anyone' })
    });
    return `https://drive.google.com/uc?export=view&id=${data.id}`;
  }

  // ========== AUTH CHECK ==========
  let panelShown = false;

  function redirectToLogin() {
    window.location.href = '/login.html';
  }

  async function checkAccess(user) {
    document.getElementById('loadStatus').textContent = 'Verifying access...';
    try {
      const doc = await db.collection('secure-admin').doc(user.uid).get();
      if (doc.exists) {
        showPanel(user);
      } else {
        document.getElementById('loadingScreen').innerHTML = '<p style="color:red;">❌ Not authorized. <a href="/login.html" style="color:#fff;">Login again</a></p>';
        auth.signOut();
      }
    } catch (e) {
      document.getElementById('loadingScreen').innerHTML = '<p style="color:red;">Error: ' + e.message + '</p>';
    }
  }

  function showPanel(user) {
    if (panelShown) return;
    panelShown = true;
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
    document.getElementById('userEmail').textContent = '👤 ' + user.email;
    initGoogleAPI();
    loadTab('dashboard');
    document.querySelectorAll('#sidebarNav button').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#sidebarNav button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        loadTab(this.dataset.tab);
      });
    });
  }

  const currentUser = auth.currentUser;
  if (currentUser) {
    checkAccess(currentUser);
  } else {
    const unsubscribe = auth.onAuthStateChanged(user => {
      unsubscribe();
      if (user) checkAccess(user);
      else redirectToLogin();
    });
  }

  setTimeout(() => {
    if (!panelShown && !auth.currentUser) redirectToLogin();
  }, 4000);

  function logout() {
    auth.signOut().then(() => { window.location.href = '/login.html'; });
  }

  // ========== TAB LOADER ==========
  function loadTab(tab) {
    const area = document.getElementById('contentArea');
    switch(tab) {
      case 'dashboard': dashboardTab(area); break;
      case 'website': websiteTab(area); break;
      case 'users': usersTab(area); break;
      case 'settings': settingsTab(area); break;
      case 'system': systemTab(area); break;
      case 'attendance':
        if (typeof showAttendanceTab === 'function') {
          showAttendanceTab(area);
        } else {
          area.innerHTML = '<p>Attendance module loading...</p>';
        }
        break;
    }
  }

  // ==================== DASHBOARD ====================
  async function dashboardTab(area) {
    area.innerHTML = '<p>Loading stats...</p>';
    try {
      const [stu, tea, not] = await Promise.all([
        db.collection('students').get().then(s => s.size),
        db.collection('teachers').get().then(s => s.size),
        db.collection('notifications').where('type','==','notice').get().then(s => s.size)
      ]);
      area.innerHTML = `<h3>📊 সিস্টেম ওভারভিউ</h3>
        <div class="grid">
          <div class="card">👥 মোট ছাত্র: <b>${stu}</b></div>
          <div class="card">👨‍🏫 মোট শিক্ষক: <b>${tea}</b></div>
          <div class="card">📢 নোটিশ: <b>${not}</b></div>
        </div>`;
    } catch(e) {
      area.innerHTML = `<p style="color:red;">Error: ${e.message}</p>`;
    }
  }

  // ==================== WEBSITE ====================
  function websiteTab(area) {
    area.innerHTML = `<h3>🌐 ওয়েবসাইট ম্যানেজার</h3>
      <div class="sidebar">
        <button onclick="webSub('hero')" class="active">হিরো</button>
        <button onclick="webSub('notices')">নোটিশ</button>
        <button onclick="webSub('teachers')">শিক্ষক</button>
        <button onclick="webSub('gallery')">গ্যালারি</button>
        <button onclick="webSub('videos')">ভিডিও</button>
        <button onclick="webSub('stats')">পরিসংখ্যান</button>
      </div>
      <div id="webSub" style="margin-top:16px;"></div>`;
    webSub('hero');
  }

  function webSub(tab) {
    const sub = document.getElementById('webSub');
    switch(tab) {
      case 'hero': sub.innerHTML = `<h4>হিরো সেকশন</h4><input id="heroH" placeholder="Heading (HTML allowed)"><br><input id="heroS" placeholder="Subheading"><br><button class="action" onclick="saveHero()">সংরক্ষণ</button>`; break;
      case 'notices': loadNotices(sub); break;
      case 'teachers': loadTeachers(sub); break;
      case 'gallery': loadGallery(sub); break;
      case 'videos': loadVideos(sub); break;
      case 'stats': loadStats(sub); break;
    }
  }

  async function saveHero() {
    await db.collection('settings').doc('hero').set({
      heading: document.getElementById('heroH').value,
      subheading: document.getElementById('heroS').value
    }, { merge: true });
    alert('Saved!');
  }

  async function loadNotices(sub) {
    const snap = await db.collection('notifications').where('type','==','notice').orderBy('timestamp','desc').get();
    let list = '';
    snap.forEach(doc => {
      const n = doc.data();
      list += `<div class="card"><b>${n.title}</b><br><small>${n.body||''}</small><br><button class="action" onclick="del('notifications','${doc.id}');loadNotices(document.getElementById('webSub'));">❌ Delete</button></div>`;
    });
    sub.innerHTML = `<h4>নোটিশ</h4><input id="nTitle" placeholder="Title"><br><textarea id="nBody" placeholder="Body"></textarea><br><button class="action" onclick="addNotice()">Add Notice</button><div style="margin-top:12px;">${list||'None'}</div>`;
  }

  async function addNotice() {
    await db.collection('notifications').add({
      title: document.getElementById('nTitle').value,
      body: document.getElementById('nBody').value,
      type: 'notice',
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert('Added'); loadNotices(document.getElementById('webSub'));
  }

  // ==================== TEACHERS ====================
  async function loadTeachers(sub) {
    const snap = await db.collection('teachers').get();
    let list = '';
    snap.forEach(doc => {
      const t = doc.data();
      list += `<div class="card">${t.photo ? `<img src="${t.photo}" width="40" style="border-radius:50%; margin-right:8px;">` : ''} ${t.name} - ${t.subject} <button class="action" onclick="del('teachers','${doc.id}');loadTeachers(document.getElementById('webSub'));">❌</button></div>`;
    });
    sub.innerHTML = `<h4>শিক্ষক</h4><input id="tName" placeholder="Name"><br><input id="tSub" placeholder="Subject"><br><input type="file" id="tPhotoFile" accept="image/*"><br><button class="action" onclick="addTeacher()">Add Teacher</button><div style="margin-top:12px;">${list||'None'}</div>`;
  }

  async function addTeacher() {
    const name = document.getElementById('tName').value;
    const subject = document.getElementById('tSub').value;
    const file = document.getElementById('tPhotoFile').files[0];
    let photoURL = '';
    if (file) {
      try { photoURL = await uploadToDrive(file); }
      catch(e) { alert('Upload failed: ' + e.message); return; }
    }
    await db.collection('teachers').add({ name, subject, photo: photoURL });
    alert('Teacher added'); loadTeachers(document.getElementById('webSub'));
  }

  // ==================== GALLERY ====================
  async function loadGallery(sub) {
    const snap = await db.collection('galleries').get();
    let list = '';
    snap.forEach(doc => {
      const g = doc.data();
      list += `<img src="${g.url}" width="100" style="margin:4px; border-radius:8px;"> <button class="action" onclick="del('galleries','${doc.id}');loadGallery(document.getElementById('webSub'));">❌</button>`;
    });
    sub.innerHTML = `<h4>গ্যালারি</h4><input type="file" id="gFile" accept="image/*"><br><input id="gCap" placeholder="Caption"><br><button class="action" onclick="addImage()">Add Image</button><div style="margin-top:12px;">${list||'None'}</div>`;
  }

  async function addImage() {
    const file = document.getElementById('gFile').files[0];
    const caption = document.getElementById('gCap').value;
    if (!file) { alert('Select an image'); return; }
    let url;
    try { url = await uploadToDrive(file); }
    catch(e) { alert('Upload failed: ' + e.message); return; }
    await db.collection('galleries').add({ url, caption, uploadedAt: firebase.firestore.FieldValue.serverTimestamp() });
    alert('Image added'); loadGallery(document.getElementById('webSub'));
  }

  // ==================== VIDEOS ====================
  async function loadVideos(sub) {
    const snap = await db.collection('videos').get();
    let list = '';
    snap.forEach(doc => {
      const v = doc.data();
      list += `<div class="card">${v.title} <button class="action" onclick="del('videos','${doc.id}');loadVideos(document.getElementById('webSub'));">❌</button></div>`;
    });
    sub.innerHTML = `<h4>ভিডিও</h4><input id="vTitle" placeholder="Title"><br><input id="vUrl" placeholder="YouTube Embed URL"><br><button class="action" onclick="addVideo()">Add Video</button><div style="margin-top:12px;">${list||'None'}</div>`;
  }

  async function addVideo() {
    await db.collection('videos').add({
      title: document.getElementById('vTitle').value,
      url: document.getElementById('vUrl').value
    });
    alert('Added'); loadVideos(document.getElementById('webSub'));
  }

  async function loadStats(sub) {
    const doc = await db.collection('settings').doc('stats').get();
    const s = doc.exists ? doc.data() : { students:0, teachers:0, courses:0, years:0 };
    sub.innerHTML = `<h4>হোমপেজ পরিসংখ্যান</h4>
      <label>ছাত্র: <input id="stStu" type="number" value="${s.students}"></label><br>
      <label>শিক্ষক: <input id="stTea" type="number" value="${s.teachers}"></label><br>
      <label>কোর্স: <input id="stCou" type="number" value="${s.courses}"></label><br>
      <label>অভিজ্ঞতা: <input id="stYea" type="number" value="${s.years}"></label><br>
      <button class="action" onclick="saveStats()">সংরক্ষণ</button>`;
  }

  async function saveStats() {
    await db.collection('settings').doc('stats').set({
      students: +document.getElementById('stStu').value,
      teachers: +document.getElementById('stTea').value,
      courses: +document.getElementById('stCou').value,
      years: +document.getElementById('stYea').value
    });
    alert('Stats saved');
  }

  async function del(coll, id) {
    if (confirm('Delete?')) {
      await db.collection(coll).doc(id).delete();
      alert('Deleted');
    }
  }

  // ==================== USERS ====================
  function usersTab(area) {
    area.innerHTML = `<h3>👥 ইউজার</h3>
      <select id="roleSelect"><option value="students">ছাত্র</option><option value="teachers">শিক্ষক</option></select>
      <button class="action" onclick="listUsers()">তালিকা</button>
      <button class="action" onclick="addUserForm()">+ নতুন</button>
      <div id="userArea" style="margin-top:16px;"></div>`;
  }

  async function listUsers() {
    const role = document.getElementById('roleSelect').value;
    const snap = await db.collection(role).get();
    let html = '';
    snap.forEach(doc => {
      const d = doc.data();
      html += `<div class="card">${d.name||d.email||doc.id} <button class="action" onclick="del('${role}','${doc.id}');listUsers();">❌</button></div>`;
    });
    document.getElementById('userArea').innerHTML = html || 'None';
  }

  function addUserForm() {
    const role = document.getElementById('roleSelect').value;
    const area = document.getElementById('userArea');
    if (role === 'students') {
      area.innerHTML = `<input id="sId" placeholder="Student ID"><input id="sName" placeholder="Name"><input id="sClass" placeholder="Class"><input type="password" id="sPass" placeholder="Password"><button class="action" onclick="addStudent()">Create Student</button>`;
    } else {
      area.innerHTML = `<input id="tId" placeholder="Teacher ID"><input id="tName" placeholder="Name"><input id="tSub" placeholder="Subject"><input type="password" id="tPass" placeholder="Password"><button class="action" onclick="addTeacherUser()">Create Teacher</button>`;
    }
  }

  async function addStudent() {
    await db.collection('students').doc(document.getElementById('sId').value).set({
      name: document.getElementById('sName').value,
      class: document.getElementById('sClass').value,
      password: document.getElementById('sPass').value,
      activeStatus: true
    });
    alert('Student created'); listUsers();
  }

  async function addTeacherUser() {
    await db.collection('teachers').doc(document.getElementById('tId').value).set({
      name: document.getElementById('tName').value,
      subject: document.getElementById('tSub').value,
      password: document.getElementById('tPass').value
    });
    alert('Teacher created'); listUsers();
  }

  // ==================== SETTINGS ====================
  async function settingsTab(area) {
    const doc = await db.collection('settings').doc('site').get();
    const s = doc.exists ? doc.data() : {};
    area.innerHTML = `<h3>⚙️ সাইট সেটিংস</h3>
      <label>নাম: <input id="sName" value="${s.name||''}"></label><br>
      <label>ফোন: <input id="sPhone" value="${s.phone||''}"></label><br>
      <label>ইমেইল: <input id="sEmail" value="${s.email||''}"></label><br>
      <label>ঠিকানা: <input id="sAddr" value="${s.address||''}"></label><br>
      <label>ফেসবুক: <input id="sFB" value="${s.facebook||''}"></label><br>
      <label>ইউটিউব: <input id="sYT" value="${s.youtube||''}"></label><br>
      <label>ম্যাপ লিংক: <input id="sMap" value="${s.map||''}"></label><br>
      <button class="action" onclick="saveSiteSettings()">সংরক্ষণ</button>`;
  }

  async function saveSiteSettings() {
    await db.collection('settings').doc('site').set({
      name: document.getElementById('sName').value,
      phone: document.getElementById('sPhone').value,
      email: document.getElementById('sEmail').value,
      address: document.getElementById('sAddr').value,
      facebook: document.getElementById('sFB').value,
      youtube: document.getElementById('sYT').value,
      map: document.getElementById('sMap').value
    });
    alert('Settings saved');
  }

  // ==================== SYSTEM ====================
  function systemTab(area) {
    area.innerHTML = `<h3>🛠️ সিস্টেম</h3>
      <button class="action" onclick="alert('Coming soon')">🏆 লিডারবোর্ড আপডেট</button>
      <button class="action" onclick="alert('Coming soon')">📋 লগ</button>`;
  }
</script>

<!-- Load Attendance Module -->
<script src="/secure-admin/attendance-module.js"></script>
</body>
</html>
