<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a1628">
  <link rel="manifest" href="/manifest.json">
  <title>MAAC | Student Login</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --navy:       #0a1628;
      --navy2:      #112040;
      --gold:       #c9a84c;
      --gold2:      #e8c96a;
      --text:       #1a2540;
      --muted:      #6b7a99;
      --border:     rgba(10,22,40,0.12);
      --card-bg:    #ffffff;
      --bg:         #f7f5f0;
      --success:    #22c55e;
      --danger:     #ef4444;
      --radius:     16px;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
      --shadow-lg:  0 20px 60px rgba(10,22,40,0.18);
    }

    [data-theme="dark"] {
      --text:    #e8edf7;
      --muted:   #8fa3c8;
      --border:  rgba(255,255,255,0.08);
      --card-bg: #152036;
      --bg:      #0d1a30;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', 'Noto Sans Bengali', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(201,168,76,0.18) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(30,203,225,0.10) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(201,168,76,0.08) 0%, transparent 40%);
    }

    /* Floating dots */
    .dot {
      position: absolute;
      border-radius: 50%;
      background: rgba(201,168,76,0.15);
      animation: float 6s ease-in-out infinite;
    }
    .dot:nth-child(1) { width:80px; height:80px; top:10%; left:10%; animation-delay:0s; }
    .dot:nth-child(2) { width:50px; height:50px; top:70%; left:80%; animation-delay:2s; }
    .dot:nth-child(3) { width:30px; height:30px; top:40%; left:5%; animation-delay:4s; }
    .dot:nth-child(4) { width:60px; height:60px; top:80%; left:20%; animation-delay:1s; }
    .dot:nth-child(5) { width:20px; height:20px; top:20%; left:75%; animation-delay:3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.4; }
      50%       { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
    }

    /* Login card */
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.5rem; font-weight: 700;
      font-family: 'DM Serif Display', serif;
      margin: 0 auto 14px;
      border: 2px solid rgba(201,168,76,0.3);
    }

    .logo-area h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--text);
    }

    .logo-area p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .logo-mark img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block; }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .form-input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border var(--transition), box-shadow var(--transition);
    }

    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }

    /* Toggle password visibility */
    .toggle-pass {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      font-size: 0.9rem; padding: 2px;
      transition: color var(--transition);
    }

    .toggle-pass:hover { color: var(--gold); }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--navy);
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.4);
    }

    .btn-login:disabled {
      opacity: 0.7; cursor: not-allowed; transform: none;
    }

    /* Message */
    .msg {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .msg.show { display: flex; }
    .msg.error   { background: rgba(239,68,68,0.12); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
    .msg.success { background: rgba(34,197,94,0.12); color: var(--success); border: 1px solid rgba(34,197,94,0.25); }

    /* Footer links */
    .card-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .card-footer p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }

    .card-footer a:hover { text-decoration: underline; }

    /* Back to home */
    .back-home {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color var(--transition);
    }

    .back-home:hover { color: var(--gold); }

    /* Theme toggle */
    .theme-toggle {
      position: absolute;
      top: 20px; right: 20px;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none; cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      z-index: 20;
    }

    .theme-toggle:hover { background: var(--gold); color: var(--navy); }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(10,22,40,0.3);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    /* ============================================================
       INSTALL PROMPT BANNER
    ============================================================ */
    .install-banner {
      position: fixed;
      left: 50%; bottom: -140px;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      z-index: 200;
      transition: bottom 0.4s cubic-bezier(.4,0,.2,1);
    }
    .install-banner.show { bottom: 20px; }
    .install-banner .ib-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.2rem;
      overflow: hidden;
    }
    .install-banner .ib-icon img { width: 100%; height: 100%; object-fit: cover; }
    .install-banner .ib-text { flex: 1; min-width: 0; }
    .install-banner .ib-text strong { display: block; font-size: 0.88rem; color: var(--text); }
    .install-banner .ib-text span { font-size: 0.76rem; color: var(--muted); }
    .install-banner .ib-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .install-banner button {
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.8rem;
      padding: 9px 14px; transition: all var(--transition);
    }
    .install-banner .ib-install {
      background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy);
    }
    .install-banner .ib-install:hover { transform: translateY(-2px); }
    .install-banner .ib-dismiss {
      background: transparent; color: var(--muted); padding: 9px 10px;
    }
    .install-banner .ib-dismiss:hover { color: var(--text); }

    /* ============================================================
       UPDATE AVAILABLE BANNER (highest priority — top of screen)
    ============================================================ */
    .update-banner {
      position: fixed;
      top: -120px; left: 0; right: 0;
      z-index: 300;
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      border-bottom: 2px solid var(--gold);
      box-shadow: 0 8px 32px rgba(10,22,40,0.4);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: top 0.4s cubic-bezier(.4,0,.2,1);
    }
    .update-banner.show { top: 0; }
    .update-banner .ub-icon {
      width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%;
      background: rgba(201,168,76,0.18);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.05rem;
      animation: ub-pulse 1.6s ease-in-out infinite;
    }
    @keyframes ub-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
      50%      { box-shadow: 0 0 0 8px rgba(201,168,76,0); }
    }
    .update-banner .ub-text { flex: 1; min-width: 0; }
    .update-banner .ub-text strong { display: block; font-size: 0.88rem; color: #fff; }
    .update-banner .ub-text span { font-size: 0.76rem; color: rgba(255,255,255,0.65); }
    .update-banner .ub-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .update-banner button {
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.8rem;
      padding: 9px 16px; transition: all var(--transition);
    }
    .update-banner .ub-refresh {
      background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy);
    }
    .update-banner .ub-refresh:hover { transform: translateY(-2px); }
    .update-banner .ub-later {
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); font-weight: 500;
    }
    .update-banner .ub-later:hover { background: rgba(255,255,255,0.18); }

    @media (max-width: 480px) {
      .install-banner, .update-banner { flex-wrap: wrap; }
      .install-banner .ib-actions, .update-banner .ub-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <!-- Floating dots -->
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="themeToggle" title="Toggle theme">
    <i class="fas fa-moon" id="themeIcon"></i>
  </button>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-mark" id="loginLogoMark">M</div>
        <h1>Student Login</h1>
        <p>MAAC — Master Academic & Admission Care</p>
      </div>

      <!-- Form -->
      <div class="form-group">
        <label class="form-label" for="studentId">
          <i class="fas fa-id-card"></i> Student ID
        </label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input
            id="studentId"
            type="text"
            class="form-input"
            placeholder="Enter your Student ID"
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="studentPass">
          <i class="fas fa-lock"></i> Password
        </label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input
            id="studentPass"
            type="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <button class="toggle-pass" id="togglePass" type="button" title="Toggle password">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <!-- Login button -->
      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <div class="spinner" id="spinner"></div>
        <span class="btn-text">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </span>
      </button>

      <!-- Message -->
      <div class="msg" id="msgBox">
        <i class="fas fa-circle-info" id="msgIcon"></i>
        <span id="msgText"></span>
      </div>

      <!-- Footer -->
      <div class="card-footer">
        <p>Need help? Contact <a href="https://wa.me/8801713289750" target="_blank">Admin via WhatsApp</a></p>
      </div>

    </div>

    <!-- Back to home — relative path for GitHub Pages -->
    <a class="back-home" href="/">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>

  <!-- Install App Banner -->
  <div class="install-banner" id="installBanner">
    <div class="ib-icon" id="installBannerIcon">M</div>
    <div class="ib-text">
      <strong>Install MAAC App</strong>
      <span>Add to home screen for quick, offline access.</span>
    </div>
    <div class="ib-actions">
      <button class="ib-dismiss" id="installDismissBtn">Not now</button>
      <button class="ib-install" id="installConfirmBtn">Install</button>
    </div>
  </div>

  <!-- Update Available Banner -->
  <div class="update-banner" id="updateBanner">
    <div class="ub-icon"><i class="fas fa-rotate"></i></div>
    <div class="ub-text">
      <strong>Update Available</strong>
      <span>A new version of the app is ready.</span>
    </div>
    <div class="ub-actions">
      <button class="ub-later" id="updateLaterBtn">Later</button>
      <button class="ub-refresh" id="updateRefreshBtn">Refresh Now</button>
    </div>
  </div>

  <!-- ============================================================ FIREBASE (CDN — works on GitHub Pages) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    // ============================================================
    // FIREBASE INIT
    // ============================================================
    const firebaseConfig = {
      apiKey:            "AIzaSyCwRPJ7Rh-0yA_ZNSfsMv2JIFqQVL_YDqI",
      authDomain:        "maac-system.firebaseapp.com",
      projectId:         "maac-system",
      storageBucket:     "maac-system.firebasestorage.app",
      messagingSenderId: "888172288312",
      appId:             "1:888172288312:web:29e2e182e2dbd55df209cd"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ============================================================
    // DYNAMIC LOGO
    // ============================================================
    (async function loadLogo() {
      try {
        const doc = await db.collection('settings').doc('site').get();
        if (doc.exists) {
          const site = doc.data();
          if (site.logoUrl) {
            const markHTML = `<img src="${site.logoUrl}" alt="${site.name || 'MAAC'} Logo">`;
            const loginMark = document.getElementById('loginLogoMark');
            const installMark = document.getElementById('installBannerIcon');
            if (loginMark) loginMark.innerHTML = markHTML;
            if (installMark) installMark.innerHTML = markHTML;
          }
        }
      } catch (e) { console.warn('Logo load error:', e.message); }
    })();

    // ============================================================
    // THEME
    // ============================================================
    const html      = document.documentElement;
    const themeBtn  = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    const saved = localStorage.getItem('maac-theme') || 'light';
    html.setAttribute('data-theme', saved);
    themeIcon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

    themeBtn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      themeIcon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('maac-theme', next);
    });

    // ============================================================
    // PASSWORD TOGGLE
    // ============================================================
    document.getElementById('togglePass').addEventListener('click', () => {
      const inp = document.getElementById('studentPass');
      const ico = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'fas fa-eye-slash';
      } else {
        inp.type = 'password';
        ico.className = 'fas fa-eye';
      }
    });

    // ============================================================
    // SHOW MESSAGE
    // ============================================================
    function showMsg(text, type) {
      const box  = document.getElementById('msgBox');
      const txt  = document.getElementById('msgText');
      const icon = document.getElementById('msgIcon');
      box.className  = `msg show ${type}`;
      txt.textContent = text;
      icon.className  = type === 'error'
        ? 'fas fa-circle-xmark'
        : 'fas fa-circle-check';
    }

    function clearMsg() {
      document.getElementById('msgBox').className = 'msg';
    }

    // ============================================================
    // LOGIN HANDLER
    // ============================================================
    async function handleLogin() {
      const id   = document.getElementById('studentId').value.trim();
      const pass = document.getElementById('studentPass').value;
      const btn  = document.getElementById('loginBtn');

      clearMsg();

      if (!id || !pass) {
        showMsg('Please enter your Student ID and Password.', 'error');
        return;
      }

      // Show loading state
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const doc = await db.collection('students').doc(id).get();

        if (!doc.exists) {
          showMsg('❌ Student ID not found. Please check and try again.', 'error');
          return;
        }

        const data = doc.data();

        if (!data.activeStatus) {
          showMsg('⛔ Your account is inactive. Contact admin.', 'error');
          return;
        }

        if (data.password !== pass) {
          showMsg('❌ Incorrect password. Please try again.', 'error');
          return;
        }

        // Save session — NO Firebase auth needed for students
        const session = {
          id:        id,
          name:      data.name      || 'Student',
          class:     data.class     || '',
          phone:     data.phone     || '',
          joinedAt:  data.createdAt || '',
          loggedAt:  Date.now()
        };
        sessionStorage.setItem('maacStudent', JSON.stringify(session));

        showMsg('✅ Login successful! Redirecting...', 'success');

        // ✅ RELATIVE PATH — works on GitHub Pages
        setTimeout(() => {
          window.location.href = 'student/portal.html';
        }, 900);

      } catch (err) {
        showMsg('⚠️ Error: ' + err.message, 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // ============================================================
    // ADMIN-TRIGGERED UPDATE NOTIFICATION (Firestore live listener — free plan compatible)
    // ============================================================
    (function watchAppVersion() {
      const SEEN_KEY = 'maac-last-seen-version';
      const lastSeen = localStorage.getItem(SEEN_KEY);
      let firstSnapshot = true;

      db.collection('settings').doc('appVersion').onSnapshot(doc => {
        if (!doc.exists) return;
        const data = doc.data();
        const version = String(data.version || '');

        // On first load, just record the current version without alerting —
        // only alert when it CHANGES while the student is using the app, or
        // if they've never seen any version notice before.
        if (firstSnapshot) {
          firstSnapshot = false;
          if (lastSeen === null) {
            localStorage.setItem(SEEN_KEY, version);
            return;
          }
          if (lastSeen === version) return;
        }

        localStorage.setItem(SEEN_KEY, version);

        const subEl = document.querySelector('#updateBanner .ub-text span');
        if (subEl) subEl.textContent = data.message || 'A new version of the app is ready.';
        notifyUpdateAvailable();
      }, err => console.warn('appVersion listener error:', err.message));
    })();

    // Allow Enter key to trigger login
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    // If already logged in, go directly to portal
    if (sessionStorage.getItem('maacStudent')) {
      window.location.href = 'student/portal.html';
    }

    // ============================================================
    // INSTALL APP PROMPT
    // ============================================================
    let deferredInstallPrompt = null;
    const installBanner = document.getElementById('installBanner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      // Don't nag if dismissed recently or already installed
      const dismissedAt = localStorage.getItem('maac-install-dismissed');
      const alreadyInstalled = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
      const recentlyDismissed = dismissedAt && (Date.now() - +dismissedAt < 1000 * 60 * 60 * 24 * 7); // 7 days
      if (!alreadyInstalled && !recentlyDismissed) {
        setTimeout(() => installBanner.classList.add('show'), 1200);
      }
    });

    document.getElementById('installConfirmBtn').addEventListener('click', async () => {
      installBanner.classList.remove('show');
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
    });

    document.getElementById('installDismissBtn').addEventListener('click', () => {
      installBanner.classList.remove('show');
      localStorage.setItem('maac-install-dismissed', Date.now().toString());
    });

    window.addEventListener('appinstalled', () => {
      installBanner.classList.remove('show');
    });

    // ============================================================
    // SERVICE WORKER — REGISTRATION + UPDATE DETECTION
    // ============================================================
    const updateBanner = document.getElementById('updateBanner');
    let waitingWorker = null;

    function notifyUpdateAvailable() {
      updateBanner.classList.add('show');

      // Vibration (mobile, if permitted by browser — no explicit permission needed for vibrate)
      if ('vibrate' in navigator) {
        navigator.vibrate([200, 100, 200, 100, 200]);
      }

      // System notification — request permission if needed, highest priority
      if ('Notification' in window) {
        const fireNotification = () => {
          try {
            const n = new Notification('MAAC — Update Available', {
              body: 'A new version of the app is ready. Tap to refresh.',
              icon: '/assets/images/icon-192.png',
              badge: '/assets/images/icon-192.png',
              tag: 'maac-update',
              requireInteraction: true, // stays until user interacts — won't be missed
              vibrate: [200, 100, 200, 100, 200]
            });
            n.onclick = () => {
              window.focus();
              document.getElementById('updateRefreshBtn').click();
            };
          } catch (e) { console.warn('Notification error:', e.message); }
        };

        if (Notification.permission === 'granted') {
          fireNotification();
        } else if (Notification.permission !== 'denied') {
          Notification.requestPermission().then(perm => {
            if (perm === 'granted') fireNotification();
          });
        }
      }
    }

    document.getElementById('updateRefreshBtn').addEventListener('click', () => {
      if (waitingWorker) {
        waitingWorker.postMessage({ type: 'SKIP_WAITING' });
      } else {
        window.location.reload();
      }
    });

    document.getElementById('updateLaterBtn').addEventListener('click', () => {
      updateBanner.classList.remove('show');
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        // Case 1: an update is already waiting when this page loads
        if (reg.waiting) {
          waitingWorker = reg.waiting;
          notifyUpdateAvailable();
        }

        // Case 2: a new worker is found while this page is open
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              waitingWorker = newWorker;
              notifyUpdateAvailable();
            }
          });
        });

        // Periodically check for updates (every 5 min while page is open)
        setInterval(() => reg.update(), 5 * 60 * 1000);
      }).catch(err => console.warn('SW registration failed:', err.message));

      // Reload once the new SW has taken control (after user clicks Refresh)
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
